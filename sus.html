<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUS Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #58CC02;
    --green-dark: #46A302;
    --green-shadow: #3A8501;
    --blue: #1CB0F6;
    --blue-dark: #0A91CC;
    --red: #FF4B4B;
    --orange: #FF9600;
    --yellow: #FFD900;
    --purple: #CE82FF;
    --gray-bg: #F7F7F7;
    --gray-border: #E5E5E5;
    --gray-text: #777;
    --dark: #3C3C3C;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--gray-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--white);
    border-radius: 24px;
    border: 2px solid var(--gray-border);
    box-shadow: 0 4px 0 var(--gray-border);
    width: 100%;
    max-width: 520px;
    padding: 40px 36px;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    justify-content: center; margin-bottom: 28px;
  }
  .logo-icon {
    width: 52px; height: 52px; background: var(--green);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; box-shadow: 0 4px 0 var(--green-shadow);
  }
  .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
  .logo-text {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 26px; color: var(--green); letter-spacing: -0.5px;
  }
  .mascot {
    display: flex; justify-content: center; margin-bottom: 20px;
    animation: bounce 1s ease infinite alternate;
  }
  .mascot svg { width: 72px; height: 72px; }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }
  .section-title {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 22px; color: var(--dark); text-align: center; margin-bottom: 8px;
  }
  .section-sub {
    font-size: 14px; color: var(--gray-text);
    text-align: center; margin-bottom: 28px;
  }
  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap label {
    display: block; font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--gray-text); margin-bottom: 8px;
  }
  .input-wrap input {
    width: 100%; padding: 14px 18px;
    border: 2px solid var(--gray-border); border-radius: 14px;
    font-family: 'Nunito Sans', sans-serif; font-size: 16px;
    font-weight: 600; color: var(--dark); outline: none;
    transition: border .2s, box-shadow .2s; background: var(--white);
  }
  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(28,176,246,.15);
  }
  .input-wrap input::placeholder { color: #bbb; font-weight: 400; }
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px;
    cursor: pointer; letter-spacing: .4px;
    transition: transform .1s, box-shadow .1s, filter .15s;
  }
  .btn-green { background: var(--green); color: var(--white); box-shadow: 0 4px 0 var(--green-shadow); }
  .btn-green:hover { filter: brightness(1.05); }
  .btn-green:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-shadow); }
  .btn-green:disabled { background: #ccc; box-shadow: 0 4px 0 #aaa; cursor: not-allowed; }
  .btn-blue { background: var(--blue); color: var(--white); box-shadow: 0 4px 0 var(--blue-dark); }
  .btn-blue:hover { filter: brightness(1.05); }
  .btn-blue:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--blue-dark); }
  .progress-wrap { margin-bottom: 28px; }
  .progress-label {
    display: flex; justify-content: space-between; font-size: 12px;
    font-weight: 700; color: var(--gray-text); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .4px;
  }
  .progress-track { height: 14px; background: var(--gray-border); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), #78E000);
    border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .q-number {
    display: inline-block; background: var(--purple); color: #fff;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12px;
    padding: 3px 12px; border-radius: 99px; margin-bottom: 14px; letter-spacing: .5px;
  }
  .q-text {
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px;
    color: var(--dark); line-height: 1.35; margin-bottom: 28px;
  }
  .scale-labels { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .scale-labels span {
    font-size: 12px; font-weight: 700; color: var(--gray-text);
    max-width: 100px; text-align: center; line-height: 1.3;
  }
  .scale-labels span:last-child { text-align: right; }
  .scale-buttons { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .scale-btn {
    flex: 1; aspect-ratio: 1; border: 2px solid var(--gray-border);
    border-radius: 14px; background: var(--white);
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px;
    color: var(--dark); cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; min-width: 0;
  }
  .scale-btn:hover { border-color: var(--blue); background: rgba(28,176,246,.08); color: var(--blue); transform: translateY(-2px); }
  .scale-btn.selected { border-color: var(--green); background: var(--green); color: #fff; box-shadow: 0 4px 0 var(--green-shadow); transform: translateY(-2px); }
  .scale-btn[data-val="1"]:hover { border-color: var(--red); background: rgba(255,75,75,.08); color: var(--red); }
  .scale-btn[data-val="2"]:hover { border-color: var(--orange); background: rgba(255,150,0,.08); color: var(--orange); }
  .scale-btn[data-val="3"]:hover { border-color: var(--yellow); background: rgba(255,217,0,.08); color: #b89800; }
  .scale-btn[data-val="4"]:hover { border-color: #78E000; background: rgba(120,224,0,.08); color: #5aaa00; }
  .scale-btn[data-val="5"]:hover { border-color: var(--green); background: rgba(88,204,2,.08); color: var(--green-dark); }
  .scale-btn[data-val="6"]:hover { border-color: var(--blue); background: rgba(28,176,246,.08); color: var(--blue); }
  .scale-btn[data-val="7"]:hover { border-color: var(--purple); background: rgba(206,130,255,.08); color: var(--purple); }
  .score-label { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px; margin-top: 8px; text-align: center; padding: 20px 0; }
  .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
  .ans-item { background: var(--gray-bg); border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
  .ans-num { width: 28px; height: 28px; border-radius: 8px; background: var(--purple); color: #fff; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ans-text { font-size: 12px; color: var(--gray-text); font-weight: 600; flex: 1; line-height: 1.3; }
  .ans-val { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; color: var(--dark); }
  .divider { border: none; border-top: 2px solid var(--gray-border); margin: 24px 0; }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp .35s ease both; }
  .streak-row { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .streak-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--gray-border); transition: background .3s; }
  .streak-dot.done { background: var(--green); }
  .streak-dot.active { background: var(--yellow); box-shadow: 0 0 0 3px rgba(255,217,0,.3); animation: pulse .8s ease infinite alternate; }
  @keyframes pulse { to { box-shadow: 0 0 0 6px rgba(255,217,0,.1); } }
  .result-header { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
  .result-icon { width: 52px; height: 52px; background: var(--yellow); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #c9aa00; }
  .result-icon svg { width: 28px; height: 28px; fill: #fff; }
  .result-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 26px; color: var(--dark); }
  .summary-title { display: flex; align-items: center; gap: 8px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 15px; color: var(--dark); margin-bottom: 12px; }
  .summary-title svg { width: 18px; height: 18px; fill: var(--purple); flex-shrink: 0; }
  .responden-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14px; color: #777; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .responden-item { cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: #F7F7F7; border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; transition: background .15s; }
  .responden-item:hover { background: #EFEFEF; }
  .responden-nama { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: #3C3C3C; }
  .responden-tgl { font-family: 'Nunito Sans', sans-serif; font-size: 12px; color: #777; }
  .loading-text { text-align: center; font-size: 13px; color: #aaa; padding: 10px 0; }
</style>
</head>
<body>

<!-- SCREEN 1: LOGIN -->
<div class="card screen active" id="screen-login">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1H4.5V5h15v14.1zm0-16.1H4.5C3.4 3 2.5 3.9 2.5 5v14.1C2.5 20.2 3.4 21 4.5 21h15c1.1 0 2-.8 2-1.9V5c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <span class="logo-text">SurveySUS</span>

  <div class="mascot">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

      <ellipse cx="50" cy="38" rx="22" ry="20" fill="#78E000"/>
      <ellipse cx="28" cy="28" rx="8" ry="12" fill="#46A302" transform="rotate(-15 28 28)"/>

      <ellipse cx="28" cy="28" rx="4" ry="7" fill="#A0F040" transform="rotate(-15 28 28)"/>
      <ellipse cx="72" cy="28" rx="4" ry="7" fill="#A0F040" transform="rotate(15 72 28)"/>
      <path d="M38,54 Q28,62 30,74 Q31,80 36,78 Q40,76 38,70 Q36,62 44,58" fill="#46A302"/>
      <circle cx="40" cy="34" r="6" fill="#fff"/>
      <circle cx="40" cy="34" r="3.5" fill="#3C3C3C"/>
      <circle cx="41.5" cy="32.5" r="1.5" fill="#fff"/>
      <circle cx="60" cy="34" r="6" fill="#fff"/>
      <circle cx="60" cy="34" r="3.5" fill="#3C3C3C"/>
      <circle cx="61.5" cy="32.5" r="1.5" fill="#fff"/>
      <path d="M40,52 Q34,58 36,64" stroke="#FFD900" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="52" cy="70" rx="16" ry="14" fill="#A0F040"/>
      <rect x="24" y="82" width="14" height="14" rx="6" fill="#46A302"/>
      <rect x="44" y="86" width="14" height="10" rx="6" fill="#46A302"/>
      <rect x="62" y="84" width="14" height="12" rx="6" fill="#46A302"/>
      <path d="M78,62 Q88,58 86,68" stroke="#46A302" stroke-width="4" fill="none" stroke-linecap="round"/>

  <div class="section-title">Halo! Siapa namamu?</div>

    <label>Nama</label>

  </div>

  <div id="respondenList" style="margin-bottom:20px;"></div>

  <button class="btn btn-green" id="btnStart" disabled onclick="startSurvey()">MULAI SURVEI</button>
</div>

<!-- SCREEN 2: QUESTION -->
<div class="card screen" id="screen-question">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">Pertanyaan 1 / 10</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="streak-row" id="streakRow"></div>
  <div class="q-number" id="qNumber">PERTANYAAN 1</div>
  <div class="q-text" id="qText"></div>
  <div class="scale-labels">
    <span>Sangat Sulit</span>
    <span>Sangat Mudah</span>
  </div>
  <div class="scale-buttons">
    <button class="scale-btn" data-val="1" onclick="selectAnswer(1)">1</button>
    <button class="scale-btn" data-val="2" onclick="selectAnswer(2)">2</button>
    <button class="scale-btn" data-val="3" onclick="selectAnswer(3)">3</button>
    <button class="scale-btn" data-val="4" onclick="selectAnswer(4)">4</button>
    <button class="scale-btn" data-val="5" onclick="selectAnswer(5)">5</button>
    <button class="scale-btn" data-val="6" onclick="selectAnswer(6)">6</button>
    <button class="scale-btn" data-val="7" onclick="selectAnswer(7)">7</button>
  </div>
  <button class="btn btn-green" id="btnNext" disabled onclick="nextQuestion()">LANJUT</button>
</div>

<!-- SCREEN SEQ -->
<div class="card screen" id="screen-seq">
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Pertanyaan Tambahan</span>
      <span>Hampir selesai!</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:100%"></div>
    </div>
  </div>

  <div class="q-number">SEQ</div>
  <div class="q-text">Secara keseluruhan, seberapa mudah tugas ini diselesaikan?</div>

  <div class="scale-labels">
    <span>Sangat Sulit</span>
    <span>Sangat Mudah</span>
  </div>
  <div class="scale-buttons" id="seqButtons">
    <button class="scale-btn" data-val="1" onclick="selectSEQ(1)">1</button>
    <button class="scale-btn" data-val="2" onclick="selectSEQ(2)">2</button>
    <button class="scale-btn" data-val="3" onclick="selectSEQ(3)">3</button>
    <button class="scale-btn" data-val="4" onclick="selectSEQ(4)">4</button>
    <button class="scale-btn" data-val="5" onclick="selectSEQ(5)">5</button>
    <button class="scale-btn" data-val="6" onclick="selectSEQ(6)">6</button>
    <button class="scale-btn" data-val="7" onclick="selectSEQ(7)">7</button>
  </div>

  <button class="btn btn-green" id="btnSeqNext" disabled onclick="submitSEQ()">LIHAT HASIL</button>
</div>
  
<!-- SCREEN 3: RESULT -->
<div class="card screen" id="screen-result">
  <div class="result-header">
    <div class="result-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
    </div>
    <span class="result-title">Selesai!</span>
  </div>

  <div class="score-label" id="scoreLabel"></div>

  <div style="text-align:center;margin-bottom:20px;">
    <div id="susNumber" style="font-family:Nunito,sans-serif;font-weight:900;font-size:64px;line-height:1;"></div>
    <div style="font-size:12px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">SUS Score</div>
    <div style="background:#E5E5E5;border-radius:99px;height:14px;overflow:hidden;margin-bottom:10px;">
      <div id="susBar" style="height:100%;border-radius:99px;width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1);"></div>
    </div>
    <div id="susGrade" style="display:inline-block;padding:5px 18px;border-radius:99px;font-family:Nunito,sans-serif;font-weight:900;font-size:13px;letter-spacing:.5px;"></div>
  </div>

  <hr class="divider">

  <div class="summary-title">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
    </svg>
    Ringkasan Jawaban &mdash; <span id="resultName"></span>
  </div>
  <div class="answers-grid" id="answersGrid"></div>

  <hr class="divider">
  <button class="btn btn-blue" onclick="restartSurvey()">MULAI ULANG</button>
</div>

<script>
const questions = [
  "Saya rasa saya akan sering menggunakan sistem ini",
  "Saya merasa sistem ini terlalu kompleks",
  "Saya rasa sistem ini mudah digunakan",
  "Saya butuh bantuan teknisi untuk menggunakan sistem ini",
  "Saya merasa berbagai fungsi dalam sistem ini terintegrasi dengan baik",
  "Saya merasa terlalu banyak inkonsistensi dalam sistem ini",
  "Saya rasa kebanyakan orang akan dengan cepat bisa menggunakan sistem ini",
  "Saya merasa sistem ini sangat rumit untuk digunakan",
  "Saya merasa sangat percaya diri menggunakan sistem ini",
  "Saya perlu belajar banyak hal sebelum bisa menggunakan sistem ini"
];

let userName = '';
let currentQ = 0;
let answers = new Array(10).fill(null);
let selectedNow = null;
let seqAnswer = null;

document.getElementById('nameInput').addEventListener('input', function() {
  document.getElementById('btnStart').disabled = this.value.trim().length < 2;
});
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim().length >= 2) startSurvey();
});

function startSurvey() {
  userName = document.getElementById('nameInput').value.trim();
  if (!userName) return;
  answers = new Array(10).fill(null);
  currentQ = 0;
  selectedNow = null;
  showScreen('screen-question');
  buildStreakRow();
  loadQuestion(0);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildStreakRow() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    row.appendChild(d);
  }
}

function updateStreak(index) {
  for (let i = 0; i < 10; i++) {
    const d = document.getElementById('dot-' + i);
    if (i < index) d.className = 'streak-dot done';
    else if (i === index) d.className = 'streak-dot active';
    else d.className = 'streak-dot';
  }
}

function loadQuestion(index) {
  currentQ = index;
  selectedNow = answers[index];
  document.getElementById('qNumber').textContent = 'PERTANYAAN ' + (index + 1);
  document.getElementById('qText').textContent = questions[index];
  document.getElementById('progressText').textContent = 'Pertanyaan ' + (index + 1) + ' / 10';
  const pct = Math.round((index / 10) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  updateStreak(index);
  document.querySelectorAll('#screen-question .scale-btn').forEach(btn => {
    btn.classList.remove('selected');
    if (selectedNow !== null && parseInt(btn.dataset.val) === selectedNow) {
      btn.classList.add('selected');
    }
  });
  document.getElementById('btnNext').disabled = selectedNow === null;
  document.getElementById('btnNext').textContent = index === 9 ? 'SELESAI' : 'LANJUT';
}

function selectAnswer(val) {
  selectedNow = val;
  answers[currentQ] = val;
  document.querySelectorAll('#screen-question .scale-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.val) === val);
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  if (selectedNow === null) return;
  answers[currentQ] = selectedNow;
  if (currentQ < 9) {
    loadQuestion(currentQ + 1);
  } else {
    seqAnswer = null;
    document.querySelectorAll('#seqButtons .scale-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('btnSeqNext').disabled = true;
    showScreen('screen-seq');
  }
}

function selectSEQ(val) {
  seqAnswer = val;
  document.querySelectorAll('#seqButtons .scale-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.val) === val);
  });
  document.getElementById('btnSeqNext').disabled = false;
}

function submitSEQ() {
  if (seqAnswer === null) return;
  showResult();
}
 
function calculateSUS() {
  let total = 0;
  for (let i = 0; i < 10; i++) {
    const raw = answers[i];
    if (i % 2 === 0) {
      total += (raw - 1);
    } else {
      total += (raw - 1);
    }
  }
  return Math.round((total / 60) * 100);
}

function gradeInfo(score) {
  if (score >= 85) return { label: 'Excellent', color: '#58CC02', bg: '#E8FAD0', grade: 'A' };
  if (score >= 71) return { label: 'Good', color: '#1CB0F6', bg: '#D0EDFD', grade: 'B' };
  if (score >= 51) return { label: 'Cukup', color: '#FF9600', bg: '#FDEBD0', grade: 'C' };
  if (score >= 35) return { label: 'Buruk', color: '#FF4B4B', bg: '#FFD6D6', grade: 'D' };
  return { label: 'Sangat Buruk', color: '#FF4B4B', bg: '#FFD6D6', grade: 'F' };
}

async function showResult() {
  document.getElementById('resultName').textContent = userName;
  document.getElementById('scoreLabel').textContent = 'Terima kasih sudah mengisi survei!';
  document.getElementById('scoreLabel').style.color = '#58CC02';

  const score = calculateSUS();
  const info = gradeInfo(score);
  document.getElementById('susNumber').textContent = score;
  document.getElementById('susNumber').style.color = info.color;
  document.getElementById('susGrade').textContent = 'GRADE ' + info.grade + ' — ' + info.label;
  document.getElementById('susGrade').style.background = info.bg;
  document.getElementById('susGrade').style.color = info.color;
  setTimeout(function() {
    document.getElementById('susBar').style.width = score + '%';
    document.getElementById('susBar').style.background = info.color;
  }, 200);

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  const seqItem = document.createElement('div');
  seqItem.className = 'ans-item';
  seqItem.innerHTML =
    '<div class="ans-num" style="background:#1CB0F6;">SEQ</div>' +
    '<div class="ans-text">Seberapa mudah tugas ini diselesaikan?</div>' +
    '<div class="ans-val">' + seqAnswer + '</div>';
  grid.appendChild(seqItem);
  questions.forEach(function(q, i) {
    const item = document.createElement('div');
    item.className = 'ans-item';
    const short = q.length > 42 ? q.substring(0, 42) + '...' : q;
    item.innerHTML =
      '<div class="ans-num">' + (i + 1) + '</div>' +
      '<div class="ans-text">' + short + '</div>' +
      '<div class="ans-val">' + answers[i] + '</div>';
    grid.appendChild(item);
  });

  showScreen('screen-result');

  try {
    await window._addDoc(window._collection(window._db, 'responden'), {
      nama: userName,
      jawaban: answers.slice(),
      seq: seqAnswer,
      susScore: calculateSUS(),
      tanggal: new Date().toLocaleDateString('id-ID'),
      timestamp: Date.now()
    });
  } catch(e) {
    console.error('Gagal simpan:', e);
  }
}

window.lihatDetail = function(data) {
  document.getElementById('resultName').textContent = data.nama + ' (' + data.tanggal + ')';
  document.getElementById('scoreLabel').textContent = 'Terima kasih sudah mengisi survei!';
  document.getElementById('scoreLabel').style.color = '#58CC02';

  if (data.susScore !== undefined) {
    const info = gradeInfo(data.susScore);
    document.getElementById('susNumber').textContent = data.susScore;
    document.getElementById('susNumber').style.color = info.color;
    document.getElementById('susGrade').textContent = 'GRADE ' + info.grade + ' — ' + info.label;
    document.getElementById('susGrade').style.background = info.bg;
    document.getElementById('susGrade').style.color = info.color;
    setTimeout(function() {
      document.getElementById('susBar').style.width = data.susScore + '%';
      document.getElementById('susBar').style.background = info.color;
    }, 200);
  }

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  if (data.seq) {
    const seqItem = document.createElement('div');
    seqItem.className = 'ans-item';
    seqItem.innerHTML =
      '<div class="ans-num" style="background:#1CB0F6;">SEQ</div>' +
      '<div class="ans-text">Seberapa mudah tugas ini diselesaikan?</div>' +
      '<div class="ans-val">' + data.seq + '</div>';
    grid.appendChild(seqItem);
  }
  questions.forEach(function(q, i) {
    const item = document.createElement('div');
    item.className = 'ans-item';
    const short = q.length > 42 ? q.substring(0, 42) + '...' : q;
    item.innerHTML =
      '<div class="ans-num">' + (i + 1) + '</div>' +
      '<div class="ans-text">' + short + '</div>' +
      '<div class="ans-val">' + data.jawaban[i] + '</div>';
    grid.appendChild(item);
  });

  showScreen('screen-result');
};

window.loadRespondenList = async function() {
  const wrap = document.getElementById('respondenList');
  wrap.innerHTML = '<div class="loading-text">Memuat data...</div>';
  try {
    const q = window._query(window._collection(window._db, 'responden'), window._orderBy('timestamp', 'desc'));
    const snapshot = await window._getDocs(q);
    if (snapshot.empty) { wrap.innerHTML = ''; return; }

    let html = '<div class="responden-title">Responden Sebelumnya</div>';
    const allData = [];
    snapshot.forEach(function(doc) { allData.push(doc.data()); });

    allData.forEach(function(r, i) {
      html += '<div class="responden-item" onclick=\'lihatDetail(' + JSON.stringify(r).replace(/'/g, "&#39;") + ')\'>'
        + '<span class="responden-nama">' + r.nama + '</span>'
        + '<span class="responden-tgl">' + r.tanggal + ' &#8250;</span>'
        + '</div>';
    });

    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = '<div class="loading-text">Gagal memuat data</div>';
    console.error(e);
  }
};

function restartSurvey() {
  answers = new Array(10).fill(null);
  currentQ = 0;
  selectedNow = null;
  document.getElementById('nameInput').value = '';
  document.getElementById('btnStart').disabled = true;
  showScreen('screen-login');
  window.loadRespondenList();
}

window.addEventListener('firebaseReady', function() {
  window.loadRespondenList();
});
