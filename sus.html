<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUS Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #58CC02;
    --green-dark: #46A302;
    --green-shadow: #3A8501;
    --blue: #1CB0F6;
    --blue-dark: #0A91CC;
    --red: #FF4B4B;
    --orange: #FF9600;
    --yellow: #FFD900;
    --purple: #CE82FF;
    --gray-bg: #F7F7F7;
    --gray-border: #E5E5E5;
    --gray-text: #777;
    --dark: #3C3C3C;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--gray-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    border: 2px solid var(--gray-border);
    box-shadow: 0 4px 0 var(--gray-border);
    width: 100%;
    max-width: 520px;
    padding: 40px 36px;
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 52px; height: 52px;
    background: var(--green);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 var(--green-shadow);
  }
  .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
  .logo-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: var(--green);
    letter-spacing: -0.5px;
  }

  .mascot {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    animation: bounce 1s ease infinite alternate;
  }
  .mascot svg { width: 72px; height: 72px; }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }

  .section-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--dark);
    text-align: center;
    margin-bottom: 8px;
  }
  .section-sub {
    font-size: 14px;
    color: var(--gray-text);
    text-align: center;
    margin-bottom: 28px;
  }

  .input-wrap { position: relative; margin-bottom: 20px; }
  .input-wrap label {
    display: block;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--gray-text);
    margin-bottom: 8px;
  }
  .input-wrap input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--gray-border);
    border-radius: 14px;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--dark);
    outline: none;
    transition: border .2s, box-shadow .2s;
    background: var(--white);
  }
  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(28,176,246,.15);
  }
  .input-wrap input::placeholder { color: #bbb; font-weight: 400; }

  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: .4px;
    transition: transform .1s, box-shadow .1s, filter .15s;
  }
  .btn-green {
    background: var(--green);
    color: var(--white);
    box-shadow: 0 4px 0 var(--green-shadow);
  }
  .btn-green:hover { filter: brightness(1.05); }
  .btn-green:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-shadow); }
  .btn-green:disabled { background: #ccc; box-shadow: 0 4px 0 #aaa; cursor: not-allowed; }

  .btn-blue {
    background: var(--blue);
    color: var(--white);
    box-shadow: 0 4px 0 var(--blue-dark);
  }
  .btn-blue:hover { filter: brightness(1.05); }
  .btn-blue:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--blue-dark); }

  .progress-wrap { margin-bottom: 28px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-text);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .progress-track {
    height: 14px;
    background: var(--gray-border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #78E000);
    border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  .q-number {
    display: inline-block;
    background: var(--purple);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
    letter-spacing: .5px;
  }
  .q-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--dark);
    line-height: 1.35;
    margin-bottom: 28px;
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .scale-labels span {
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-text);
    max-width: 100px;
    text-align: center;
    line-height: 1.3;
  }
  .scale-labels span:last-child { text-align: right; }

  .scale-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .scale-btn {
    flex: 1;
    aspect-ratio: 1;
    border: 2px solid var(--gray-border);
    border-radius: 14px;
    background: var(--white);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--dark);
    cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    min-width: 0;
  }
  .scale-btn:hover { border-color: var(--blue); background: rgba(28,176,246,.08); color: var(--blue); transform: translateY(-2px); }
  .scale-btn.selected {
    border-color: var(--green);
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 0 var(--green-shadow);
    transform: translateY(-2px);
  }
  .scale-btn[data-val="1"]:hover { border-color: var(--red); background: rgba(255,75,75,.08); color: var(--red); }
  .scale-btn[data-val="2"]:hover { border-color: var(--orange); background: rgba(255,150,0,.08); color: var(--orange); }
  .scale-btn[data-val="3"]:hover { border-color: var(--yellow); background: rgba(255,217,0,.08); color: #b89800; }
  .scale-btn[data-val="4"]:hover { border-color: #78E000; background: rgba(120,224,0,.08); color: #5aaa00; }
  .scale-btn[data-val="5"]:hover { border-color: var(--green); background: rgba(88,204,2,.08); color: var(--green-dark); }
  .scale-btn[data-val="6"]:hover { border-color: var(--blue); background: rgba(28,176,246,.08); color: var(--blue); }
  .scale-btn[data-val="7"]:hover { border-color: var(--purple); background: rgba(206,130,255,.08); color: var(--purple); }

  .result-score { text-align: center; margin: 20px 0; }
  .score-number {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1;
  }
  .score-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 20px;
    margin-top: 8px;
  }
  .score-bar-wrap {
    background: var(--gray-border);
    border-radius: 99px;
    height: 20px;
    margin: 16px 0;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    border-radius: 99px;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }
  .score-grade {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 99px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: .5px;
    margin-bottom: 20px;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 20px 0;
  }
  .ans-item {
    background: var(--gray-bg);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ans-num {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--purple);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ans-text { font-size: 12px; color: var(--gray-text); font-weight: 600; flex: 1; line-height: 1.3; }
  .ans-val { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; color: var(--dark); }

  .divider { border: none; border-top: 2px solid var(--gray-border); margin: 24px 0; }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp .35s ease both; }

  .streak-row {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .streak-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--gray-border);
    transition: background .3s;
  }
  .streak-dot.done { background: var(--green); }
  .streak-dot.active {
    background: var(--yellow);
    box-shadow: 0 0 0 3px rgba(255,217,0,.3);
    animation: pulse .8s ease infinite alternate;
  }
  @keyframes pulse { to { box-shadow: 0 0 0 6px rgba(255,217,0,.1); } }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .result-icon {
    width: 52px; height: 52px;
    background: var(--yellow);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 0 #c9aa00;
  }
  .result-icon svg { width: 28px; height: 28px; fill: #fff; }
  .result-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: var(--dark);
  }

  .summary-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 15px;
    color: var(--dark);
    margin-bottom: 12px;
  }
  .summary-title svg { width: 18px; height: 18px; fill: var(--purple); flex-shrink: 0; }
</style>
</head>
<body>

<!-- SCREEN 1: LOGIN -->
<div class="card screen active" id="screen-login">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1H4.5V5h15v14.1zm0-16.1H4.5C3.4 3 2.5 3.9 2.5 5v14.1C2.5 20.2 3.4 21 4.5 21h15c1.1 0 2-.8 2-1.9V5c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <span class="logo-text">SurveySUS</span>
  </div>

  <div class="mascot">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- body -->
      <ellipse cx="50" cy="68" rx="30" ry="24" fill="#58CC02"/>
      <!-- head -->
      <ellipse cx="50" cy="38" rx="22" ry="20" fill="#78E000"/>
      <!-- left ear -->
      <ellipse cx="28" cy="28" rx="8" ry="12" fill="#46A302" transform="rotate(-15 28 28)"/>
      <!-- right ear -->
      <ellipse cx="72" cy="28" rx="8" ry="12" fill="#46A302" transform="rotate(15 72 28)"/>
      <!-- left ear inner -->
      <ellipse cx="28" cy="28" rx="4" ry="7" fill="#A0F040" transform="rotate(-15 28 28)"/>
      <!-- right ear inner -->
      <ellipse cx="72" cy="28" rx="4" ry="7" fill="#A0F040" transform="rotate(15 72 28)"/>
      <!-- trunk -->
      <path d="M38,54 Q28,62 30,74 Q31,80 36,78 Q40,76 38,70 Q36,62 44,58" fill="#46A302"/>
      <!-- left eye -->
      <circle cx="40" cy="34" r="6" fill="#fff"/>
      <circle cx="40" cy="34" r="3.5" fill="#3C3C3C"/>
      <circle cx="41.5" cy="32.5" r="1.5" fill="#fff"/>
      <!-- right eye -->
      <circle cx="60" cy="34" r="6" fill="#fff"/>
      <circle cx="60" cy="34" r="3.5" fill="#3C3C3C"/>
      <circle cx="61.5" cy="32.5" r="1.5" fill="#fff"/>
      <!-- tusk left -->
      <path d="M40,52 Q34,58 36,64" stroke="#FFD900" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- belly -->
      <ellipse cx="52" cy="70" rx="16" ry="14" fill="#A0F040"/>
      <!-- left front leg -->
      <rect x="24" y="82" width="14" height="14" rx="6" fill="#46A302"/>
      <!-- right front leg -->
      <rect x="44" y="86" width="14" height="10" rx="6" fill="#46A302"/>
      <!-- right back leg -->
      <rect x="62" y="84" width="14" height="12" rx="6" fill="#46A302"/>
      <!-- tail -->
      <path d="M78,62 Q88,58 86,68" stroke="#46A302" stroke-width="4" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="section-title">Halo! Siapa namamu?</div>
  <div class="section-sub">Masukkan namamu untuk memulai survei SUS</div>
  <div class="input-wrap">
    <label>Nama</label>
    <input type="text" id="nameInput" placeholder="Tulis namamu di sini..." autocomplete="off" />
  </div>
  <div id="respondenList" style="margin-bottom:20px;"></div>
  <button class="btn btn-green" id="btnStart" disabled onclick="startSurvey()">MULAI SURVEI</button>
</div>

<!-- SCREEN 2: QUESTION -->
<div class="card screen" id="screen-question">
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">Pertanyaan 1 / 10</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="streak-row" id="streakRow"></div>

  <div class="q-number" id="qNumber">PERTANYAAN 1</div>
  <div class="q-text" id="qText"></div>

  <div class="scale-labels">
    <span>Sangat Sulit</span>
    <span>Sangat Mudah</span>
  </div>
  <div class="scale-buttons" id="scaleButtons">
    <button class="scale-btn" data-val="1" onclick="selectAnswer(1)">1</button>
    <button class="scale-btn" data-val="2" onclick="selectAnswer(2)">2</button>
    <button class="scale-btn" data-val="3" onclick="selectAnswer(3)">3</button>
    <button class="scale-btn" data-val="4" onclick="selectAnswer(4)">4</button>
    <button class="scale-btn" data-val="5" onclick="selectAnswer(5)">5</button>
    <button class="scale-btn" data-val="6" onclick="selectAnswer(6)">6</button>
    <button class="scale-btn" data-val="7" onclick="selectAnswer(7)">7</button>
  </div>

  <button class="btn btn-green" id="btnNext" disabled onclick="nextQuestion()">LANJUT</button>
</div>

<!-- SCREEN 3: RESULT -->
<div class="card screen" id="screen-result">
  <div class="result-header">
    <div class="result-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
    </div>
    <span class="result-title">Selesai!</span>
  </div>

  <div class="result-score">
    <div class="score-label" id="scoreLabel"></div>
  </div>

  <hr class="divider">

  <div class="summary-title">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
    </svg>
    Ringkasan Jawaban &mdash; <span id="resultName"></span>
  </div>
  <div class="answers-grid" id="answersGrid"></div>

  <hr class="divider">
  <button class="btn btn-blue" onclick="restartSurvey()">MULAI ULANG</button>
</div>

<script>
const questions = [
  "Saya rasa saya akan sering menggunakan sistem ini",
  "Saya merasa sistem ini terlalu kompleks",
  "Saya rasa sistem ini mudah digunakan",
  "Saya butuh bantuan teknisi untuk menggunakan sistem ini",
  "Saya merasa berbagai fungsi dalam sistem ini terintegrasi dengan baik",
  "Saya merasa terlalu banyak inkonsistensi dalam sistem ini",
  "Saya rasa kebanyakan orang akan dengan cepat bisa menggunakan sistem ini",
  "Saya merasa sistem ini sangat rumit untuk digunakan",
  "Saya merasa sangat percaya diri menggunakan sistem ini",
  "Saya perlu belajar banyak hal sebelum bisa menggunakan sistem ini"
];

let userName = '';
let currentQ = 0;
let answers = new Array(10).fill(null);
let selectedNow = null;

document.getElementById('nameInput').addEventListener('input', function() {
  document.getElementById('btnStart').disabled = this.value.trim().length < 2;
});
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim().length >= 2) startSurvey();
});

function startSurvey() {
  userName = document.getElementById('nameInput').value.trim();
  if (!userName) return;
  showScreen('screen-question');
  buildStreakRow();
  loadQuestion(0);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function buildStreakRow() {
  const row = document.getElementById('streakRow');
  row.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    row.appendChild(d);
  }
}

function updateStreak(index) {
  for (let i = 0; i < 10; i++) {
    const d = document.getElementById('dot-' + i);
    if (i < index) d.className = 'streak-dot done';
    else if (i === index) d.className = 'streak-dot active';
    else d.className = 'streak-dot';
  }
}

function loadQuestion(index) {
  currentQ = index;
  selectedNow = answers[index];
  document.getElementById('qNumber').textContent = 'PERTANYAAN ' + (index + 1);
  document.getElementById('qText').textContent = questions[index];
  document.getElementById('progressText').textContent = 'Pertanyaan ' + (index + 1) + ' / 10';
  const pct = Math.round((index / 10) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  updateStreak(index);

  document.querySelectorAll('.scale-btn').forEach(btn => {
    btn.classList.remove('selected');
    if (selectedNow !== null && parseInt(btn.dataset.val) === selectedNow) {
      btn.classList.add('selected');
    }
  });
  document.getElementById('btnNext').disabled = selectedNow === null;
  document.getElementById('btnNext').textContent = index === 9 ? 'SELESAI' : 'LANJUT';
}

function selectAnswer(val) {
  selectedNow = val;
  answers[currentQ] = val;
  document.querySelectorAll('.scale-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.val) === val);
  });
  document.getElementById('btnNext').disabled = false;
}

function nextQuestion() {
  if (selectedNow === null) return;
  answers[currentQ] = selectedNow;
  if (currentQ < 9) {
    loadQuestion(currentQ + 1);
  } else {
    showResult();
  }
}

function calculateSUS() { return null; }

function gradeInfo(score) {
  if (score >= 85) return { label: 'Excellent', color: '#58CC02', bg: '#E8FAD0', grade: 'A' };
  if (score >= 71) return { label: 'Good', color: '#1CB0F6', bg: '#D0EDFD', grade: 'B' };
  if (score >= 51) return { label: 'Cukup', color: '#FF9600', bg: '#FDEBD0', grade: 'C' };
  if (score >= 35) return { label: 'Buruk', color: '#FF4B4B', bg: '#FFD6D6', grade: 'D' };
  return { label: 'Sangat Buruk', color: '#FF4B4B', bg: '#FFD6D6', grade: 'F' };
}

function showResult() {
  const score = calculateSUS();
  const info = gradeInfo(score);

  document.getElementById('scoreLabel').textContent = 'Terima kasih sudah mengisi survei!';
  document.getElementById('scoreLabel').style.color = info.color;
  document.getElementById('resultName').textContent = userName;

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'ans-item';
    const short = q.length > 42 ? q.substring(0, 42) + '...' : q;
    item.innerHTML =
      '<div class="ans-num">' + (i + 1) + '</div>' +
      '<div class="ans-text">' + short + '</div>' +
      '<div class="ans-val">' + answers[i] + '</div>';
    grid.appendChild(item);
  });

const responden = JSON.parse(localStorage.getItem('sus_responden') || '[]');
  responden.push({ nama: userName, tanggal: new Date().toLocaleDateString('id-ID'), jawaban: answers.slice() });
  localStorage.setItem('sus_responden', JSON.stringify(responden));

  showScreen('screen-result');
}

function lihatDetail(idx) {
  const list = JSON.parse(localStorage.getItem('sus_responden') || '[]');
  const r = list[idx];
  if (!r || !r.jawaban) return;

  userName = r.nama;
  answers = r.jawaban.slice();

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  questions.forEach(function(q, i) {
    const item = document.createElement('div');
    item.className = 'ans-item';
    const short = q.length > 42 ? q.substring(0, 42) + '...' : q;
    item.innerHTML =
      '<div class="ans-num">' + (i + 1) + '</div>' +
      '<div class="ans-text">' + short + '</div>' +
      '<div class="ans-val">' + r.jawaban[i] + '</div>';
    grid.appendChild(item);
  });

  document.getElementById('resultName').textContent = r.nama + ' (' + r.tanggal + ')';
  document.getElementById('scoreLabel').textContent = 'Terima kasih sudah mengisi survei!';
  document.getElementById('scoreLabel').style.color = '#58CC02';

  showScreen('screen-result');
}

function loadRespondenList() {
  const list = JSON.parse(localStorage.getItem('sus_responden') || '[]');
  const wrap = document.getElementById('respondenList');
  if (list.length === 0) {
    wrap.innerHTML = '';
    return;
  }
  let html = '<div style="font-family:Nunito,sans-serif;font-weight:900;font-size:14px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Responden Sebelumnya</div>';
  html += '<div style="display:flex;flex-direction:column;gap:8px;">';
  list.slice().reverse().forEach(function(r, i) {
    const idx = list.length - 1 - i;
    html += '<div onclick="lihatDetail(' + idx + ')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#F7F7F7;border-radius:12px;padding:10px 14px;transition:background .15s;" onmouseover="this.style.background=\'#EFEFEF\'" onmouseout="this.style.background=\'#F7F7F7\'">'
      + '<span style="font-family:Nunito,sans-serif;font-weight:700;font-size:14px;color:#3C3C3C;">' + r.nama + '</span>'
      + '<span style="font-family:Nunito,sans-serif;font-size:12px;color:#777;">' + r.tanggal + ' &rsaquo;</span>'
      + '</div>';
  });
  html += '</div>';
  wrap.innerHTML = html;
}

function clearData() {
  localStorage.removeItem('sus_responden');
  loadRespondenList();
}

function restartSurvey() {
  answers = new Array(10).fill(null);
  currentQ = 0;
  selectedNow = null;
  document.getElementById('nameInput').value = '';
  document.getElementById('btnStart').disabled = true;
  showScreen('screen-login');
  loadRespondenList();
}

loadRespondenList();

</script>
